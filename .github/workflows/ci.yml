name: CI

on:
  push:
    branches: [master, v1]
  pull_request:
    branches: [master, v1]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check
        run: cargo check --workspace --all-targets

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Verify and count enums against C source
        run: |
          parse_count() { tail -1 | grep -oP '\d+/\d+'; }

          EVENT_TYPE_COUNT=$(hooks/check-event-types.sh 2>&1 | parse_count) || true
          HANGUP_CAUSE_COUNT=$(hooks/check-hangup-causes.sh 2>&1 | parse_count) || true
          CHANNEL_STATE_COUNT=$(hooks/check-channel-states.sh 2>&1 | parse_count) || true
          CALL_STATE_COUNT=$(hooks/check-call-states.sh 2>&1 | parse_count) || true

          if [ -z "$EVENT_TYPE_COUNT" ]; then
            echo "::warning::C source not available, skipping enum counts"
            echo "C_SOURCE_AVAILABLE=false" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "C_SOURCE_AVAILABLE=true" >> "$GITHUB_ENV"

          echo "EVENT_TYPE_COUNT=${EVENT_TYPE_COUNT}" >> "$GITHUB_ENV"
          echo "HANGUP_CAUSE_COUNT=${HANGUP_CAUSE_COUNT}" >> "$GITHUB_ENV"
          echo "CHANNEL_STATE_COUNT=${CHANNEL_STATE_COUNT}" >> "$GITHUB_ENV"
          echo "CALL_STATE_COUNT=${CALL_STATE_COUNT}" >> "$GITHUB_ENV"

      - name: Count typed enum variants
        run: |
          echo "EVENT_HEADER_COUNT=$(grep -c '=> "' freeswitch-types/src/headers.rs)" >> "$GITHUB_ENV"
          echo "CHANNEL_VAR_COUNT=$(grep -c '=> "' freeswitch-types/src/variables/core.rs)" >> "$GITHUB_ENV"
          echo "HEADER_LOOKUP_COUNT=$(sed -n '/^pub trait HeaderLookup/,/^}/p' freeswitch-types/src/lookup.rs | grep -c '^ *fn ')" >> "$GITHUB_ENV"
          echo "SIP_INVITE_HEADER_COUNT=$(grep -c '=> "' freeswitch-types/src/variables/sip_invite.rs)" >> "$GITHUB_ENV"
          echo "SOFIA_VARIABLE_COUNT=$(grep -c '=> "' freeswitch-types/src/variables/sofia.rs)" >> "$GITHUB_ENV"

      - name: Test
        run: |
          set -o pipefail
          CARGO_TERM_COLOR=never cargo test --workspace 2>&1 | tee test-output.txt
          passed=$(grep '^test result:' test-output.txt | sed 's/.*ok\. \([0-9]*\) passed.*/\1/' | paste -sd+ | bc)
          echo "TEST_PASSED=$passed" >> "$GITHUB_ENV"

      - name: Update test count badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: test-count.json
          label: tests
          message: "${{ env.TEST_PASSED }} passed"
          color: brightgreen

      - name: Update EslEventType badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push' && env.C_SOURCE_AVAILABLE == 'true'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: event-type-count.json
          label: EslEventType
          message: "${{ env.EVENT_TYPE_COUNT }}"
          color: blue

      - name: Update HangupCause badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push' && env.C_SOURCE_AVAILABLE == 'true'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: hangup-cause-count.json
          label: HangupCause
          message: "${{ env.HANGUP_CAUSE_COUNT }}"
          color: blue

      - name: Update ChannelState badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push' && env.C_SOURCE_AVAILABLE == 'true'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: channel-state-count.json
          label: ChannelState
          message: "${{ env.CHANNEL_STATE_COUNT }}"
          color: blue

      - name: Update CallState badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push' && env.C_SOURCE_AVAILABLE == 'true'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: call-state-count.json
          label: CallState
          message: "${{ env.CALL_STATE_COUNT }}"
          color: blue

      - name: Update EventHeader count badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: event-header-count.json
          label: EventHeader
          message: "${{ env.EVENT_HEADER_COUNT }}"
          color: blue

      - name: Update ChannelVariable count badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: channel-var-count.json
          label: ChannelVariable
          message: "${{ env.CHANNEL_VAR_COUNT }}"
          color: blue

      - name: Update HeaderLookup count badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: header-lookup-count.json
          label: HeaderLookup
          message: "${{ env.HEADER_LOOKUP_COUNT }} accessors"
          color: blue

      - name: Update SipInviteHeader count badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: sip-invite-header-count.json
          label: SipInviteHeader
          message: "${{ env.SIP_INVITE_HEADER_COUNT }}"
          color: blue

      - name: Update SofiaVariable count badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: sofia-variable-count.json
          label: SofiaVariable
          message: "${{ env.SOFIA_VARIABLE_COUNT }}"
          color: blue

      - name: Build
        run: cargo build --workspace --release
