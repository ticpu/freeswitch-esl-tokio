name: CI

on:
  push:
    branches: [master, v1]
  pull_request:
    branches: [master, v1]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check
        run: cargo check --workspace --all-targets

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Verify and count enums against C source
        run: |
          if ! json=$(python3 hooks/check-enums.py --json 2>/dev/null); then
            echo "::warning::C source enum check failed"
            echo "C_SOURCE_AVAILABLE=false" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "C_SOURCE_AVAILABLE=true" >> "$GITHUB_ENV"

          # Export badge message and color for each check
          python3 -c "
          import json, sys
          data = json.loads('''$json''')
          env_map = {
              'EslEventType': 'EVENT_TYPE',
              'HangupCause': 'HANGUP_CAUSE',
              'ChannelState': 'CHANNEL_STATE',
              'CallState': 'CALL_STATE',
              'CoreMediaVariable': 'CORE_MEDIA_VAR',
              'EventHeader': 'EVENT_HEADER',
          }
          for key, prefix in env_map.items():
              d = data[key]
              print(f'{prefix}_COUNT={d[\"badge_message\"]}')
              print(f'{prefix}_COLOR={d[\"badge_color\"]}')
          " >> "$GITHUB_ENV"

      - name: Count typed enum variants
        run: |
          echo "CHANNEL_VAR_COUNT=$(grep -c '=> "' freeswitch-types/src/variables/core.rs)" >> "$GITHUB_ENV"
          echo "HEADER_LOOKUP_COUNT=$(sed -n '/^pub trait HeaderLookup/,/^}/p' freeswitch-types/src/lookup.rs | grep -c '^ *fn ')" >> "$GITHUB_ENV"
          echo "SIP_HEADER_PREFIX_COUNT=$(grep -c '=> "' freeswitch-types/src/variables/sip_passthrough.rs)" >> "$GITHUB_ENV"
          echo "SOFIA_VARIABLE_COUNT=$(grep -c '=> "' freeswitch-types/src/variables/sofia.rs)" >> "$GITHUB_ENV"

      - name: Test
        run: |
          set -o pipefail
          CARGO_TERM_COLOR=never cargo test --workspace 2>&1 | tee test-output.txt
          passed=$(grep '^test result:' test-output.txt | sed 's/.*ok\. \([0-9]*\) passed.*/\1/' | paste -sd+ | bc)
          echo "TEST_PASSED=$passed" >> "$GITHUB_ENV"

      - name: Update test count badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: test-count.json
          label: tests
          message: "${{ env.TEST_PASSED }} passed"
          color: brightgreen

      - name: Update EslEventType badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push' && env.C_SOURCE_AVAILABLE == 'true'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: event-type-count.json
          label: EslEventType
          message: "${{ env.EVENT_TYPE_COUNT }}"
          color: "${{ env.EVENT_TYPE_COLOR }}"

      - name: Update HangupCause badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push' && env.C_SOURCE_AVAILABLE == 'true'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: hangup-cause-count.json
          label: HangupCause
          message: "${{ env.HANGUP_CAUSE_COUNT }}"
          color: "${{ env.HANGUP_CAUSE_COLOR }}"

      - name: Update ChannelState badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push' && env.C_SOURCE_AVAILABLE == 'true'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: channel-state-count.json
          label: ChannelState
          message: "${{ env.CHANNEL_STATE_COUNT }}"
          color: "${{ env.CHANNEL_STATE_COLOR }}"

      - name: Update CallState badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push' && env.C_SOURCE_AVAILABLE == 'true'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: call-state-count.json
          label: CallState
          message: "${{ env.CALL_STATE_COUNT }}"
          color: "${{ env.CALL_STATE_COLOR }}"

      - name: Update EventHeader badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push' && env.C_SOURCE_AVAILABLE == 'true'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: event-header-count.json
          label: EventHeader
          message: "${{ env.EVENT_HEADER_COUNT }}"
          color: "${{ env.EVENT_HEADER_COLOR }}"

      - name: Update CoreMediaVariable badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push' && env.C_SOURCE_AVAILABLE == 'true'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: core-media-var-count.json
          label: CoreMediaVariable
          message: "${{ env.CORE_MEDIA_VAR_COUNT }}"
          color: "${{ env.CORE_MEDIA_VAR_COLOR }}"

      - name: Update ChannelVariable count badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: channel-var-count.json
          label: ChannelVariable
          message: "${{ env.CHANNEL_VAR_COUNT }}"
          color: blue

      - name: Update HeaderLookup count badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: header-lookup-count.json
          label: HeaderLookup
          message: "${{ env.HEADER_LOOKUP_COUNT }} accessors"
          color: blue

      - name: Update SofiaVariable count badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: sofia-variable-count.json
          label: SofiaVariable
          message: "${{ env.SOFIA_VARIABLE_COUNT }}"
          color: blue

      - name: Build
        run: cargo build --workspace --release
