name: CI

on:
  push:
    branches: [master, v1]
  pull_request:
    branches: [master, v1]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check
        run: cargo check --all-targets

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Check EslEventType vs C ESL
        run: |
          hooks/check-event-types.sh
          count=$(sed -n '/impl fmt::Display for EslEventType/,/=> "ALL"/p' src/event.rs | grep -c '=> "')
          echo "EVENT_TYPE_COUNT=$count" >> "$GITHUB_ENV"

      - name: Count typed enum variants
        run: |
          echo "EVENT_HEADER_COUNT=$(grep -c '=> "' src/headers.rs)" >> "$GITHUB_ENV"
          echo "CHANNEL_VAR_COUNT=$(grep -c '=> "' src/variables/channel_variable.rs)" >> "$GITHUB_ENV"
          echo "HEADER_LOOKUP_COUNT=$(sed -n '/^pub trait HeaderLookup/,/^}/p' src/lookup.rs | grep -c '^ *fn ')" >> "$GITHUB_ENV"

      - name: Test
        run: |
          set -o pipefail
          CARGO_TERM_COLOR=never cargo test 2>&1 | tee test-output.txt
          passed=$(grep '^test result:' test-output.txt | sed 's/.*ok\. \([0-9]*\) passed.*/\1/' | paste -sd+ | bc)
          echo "TEST_PASSED=$passed" >> "$GITHUB_ENV"

      - name: Update test count badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: test-count.json
          label: tests
          message: "${{ env.TEST_PASSED }} passed"
          color: brightgreen

      - name: Update event type count badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: event-type-count.json
          label: event types
          message: "${{ env.EVENT_TYPE_COUNT }} (verified vs C)"
          color: blue

      - name: Update EventHeader count badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: event-header-count.json
          label: EventHeader
          message: "${{ env.EVENT_HEADER_COUNT }}"
          color: blue

      - name: Update ChannelVariable count badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: channel-var-count.json
          label: ChannelVariable
          message: "${{ env.CHANNEL_VAR_COUNT }}"
          color: blue

      - name: Update HeaderLookup count badge
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: def178758b6a88effff310aca87b6b50
          filename: header-lookup-count.json
          label: HeaderLookup
          message: "${{ env.HEADER_LOOKUP_COUNT }} accessors"
          color: blue

      - name: Build
        run: cargo build --release
